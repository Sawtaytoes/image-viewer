name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    # Gitea Actions also reads .github/workflows, but we only want CI on GitHub.
    # On Gitea, server_url is the Gitea instance URL, so this job is skipped there.
    if: ${{ github.server_url == 'https://github.com' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable Corepack (Yarn 4)
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Test
        run: yarn test:run

      - name: Typecheck
        run: yarn typecheck

      - name: Lint (Biome)
        run: yarn lint:biome

      - name: Lint (ESLint)
        run: yarn lint:eslint
