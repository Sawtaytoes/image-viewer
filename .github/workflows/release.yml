name: Release

on:
  push:
    branches:
      - master

# semantic-release needs to push the version-bump commit/tag and create releases.
permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6
        with:
          # semantic-release needs full history + tags to compute the next version.
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable Corepack (Yarn 4)
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      # Belt-and-suspenders: make sure Electron's binary is fetched under
      # Yarn 4 even if the postinstall script didn't run.
      - name: Ensure Electron binary
        run: node node_modules/electron/install.js

      - name: Release
        run: yarn semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
